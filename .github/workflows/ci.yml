name: CI

on: [push, pull_request]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install beebasm
        run: |
          git clone --depth 1 https://github.com/stardot/beebasm.git /tmp/beebasm
          cd /tmp/beebasm/src
          make code
          sudo cp /tmp/beebasm/beebasm /usr/local/bin/
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm test
